# Frontend projects configuration for bump-brat tool
#
# To add a new project:
# 1. Find the deployment file in data/services/
# 2. Search for prod-frontends and prod-multicluster-frontends namespaces
# 3. Note the line numbers of the 'ref:' lines with commit hashes (not 'master' or 'internal')
# 4. Add entry below with name, file_path, repo_url, and both line numbers

projects:
