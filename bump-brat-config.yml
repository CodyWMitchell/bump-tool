# Frontend projects configuration for bump-brat tool
#
# To add a new project:
# 1. Find the deployment file in app-interface/data/services/
# 2. Ensure the frontend appears as `name: <project-name>` in that YAML
# 3. Add entry below with name, file_path, and repo_url
#    file_path should be relative to app-interface root (../ prefix is also accepted)

projects:
  - name: access-requests-frontend
    file_path: ../data/services/insights/frontend-base/deploy.yml
    repo_url: https://github.com/RedHatInsights/access-requests-frontend

  - name: insights-rbac-ui
    file_path: ../data/services/insights/rbac/deploy-clowder.yml
    repo_url: https://github.com/RedHatInsights/insights-rbac-ui

  - name: landing-page-frontend
    file_path: ../data/services/insights/frontend-base/deploy.yml
    repo_url: https://github.com/RedHatInsights/landing-page-frontend

  - name: notifications-frontend
    file_path: ../data/services/insights/notifications/deploy-clowder.yml
    repo_url: https://github.com/RedHatInsights/notifications-frontend

  - name: sources-ui
    file_path: ../data/services/insights/sources/deploy-clowder.yml
    repo_url: https://github.com/RedHatInsights/sources-ui

  - name: user-preferences-frontend
    file_path: ../data/services/insights/notifications/deploy-clowder.yml
    repo_url: https://github.com/RedHatInsights/user-preferences-frontend
